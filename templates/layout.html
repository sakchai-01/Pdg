<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PhishGuard Security{% endblock %}</title>

    <!-- Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">

    <!-- Animation Libs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body
    class="bg-[#030712] text-gray-200 font-sans min-h-screen flex flex-col relative overflow-x-hidden selection:bg-[#00f0ff] selection:text-black"
    data-theme="cyber">

    <!-- Global Background Animation -->
    <div class="cyber-grid-bg"></div>
    <div class="cyber-particles"></div>

    <!-- Header / Navbar -->
    <nav class="cyber-nav w-full z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16 items-center">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-3 group">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(0,240,255,0.3)] group-hover:shadow-[0_0_25px_rgba(0,240,255,0.5)] transition duration-300">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <span
                        class="text-2xl font-bold text-white tracking-wider brand-font group-hover:text-[#00f0ff] transition">PHISH<span
                            class="text-[#00f0ff]">GUARD</span></span>
                </a>

                <!-- Navigation Links -->
                <div class="hidden md:flex items-center space-x-1">
                    <a href="/" class="nav-link" data-i18n="nav_home">Home</a>
                    <a href="/detect/fb" class="nav-link text-blue-400 group flex items-center gap-2">
                        <i class="fa-brands fa-facebook-f text-xs group-hover:scale-110 transition"></i> FB Detector
                    </a>
                    <a href="/about" class="nav-link" data-i18n="nav_about">Security Guide</a>
                    <a href="/news" class="nav-link" data-i18n="nav_news">News</a>
                    <a href="/chat" class="nav-link text-cyan-400 hover:text-cyan-300" data-i18n="nav_chat">Cyber AI</a>
                    <a href="/contact" class="nav-link" data-i18n="nav_contact">Contact</a>
                    <a href="/report" class="nav-link text-red-400 hover:text-red-300" data-i18n="nav_report">Report</a>
                </div>

                <!-- Right Side: Profile & Controls -->
                <div class="flex items-center gap-4">
                    <!-- Right Side: Navigation Links (Optional) -->
                    <a href="/" class="text-sm font-medium text-gray-300 hover:text-[var(--primary)] transition-colors">Dashboard</a>
                    <a href="/chat" class="text-sm font-medium text-gray-300 hover:text-[var(--primary)] transition-colors">AI Chat</a>

                    <!-- Theme Dropdown -->
                    <div class="relative group">
                        <button class="text-gray-400 hover:text-white transition p-2">
                            <i class="fa-solid fa-palette text-lg"></i>
                        </button>
                        <div
                            class="absolute right-0 mt-2 w-48 bg-[#020617] border border-gray-700 rounded-xl shadow-xl overflow-hidden hidden group-hover:block z-50">
                            <button onclick="setTheme('cyber')"
                                class="w-full text-left px-4 py-3 text-sm text-gray-300 hover:bg-white/10 hover:text-[#00f0ff] flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full bg-gradient-to-r from-cyan-400 to-blue-500"></div>
                                Cyber (Default)
                            </button>
                            <button onclick="setTheme('red')"
                                class="w-full text-left px-4 py-3 text-sm text-gray-300 hover:bg-white/10 hover:text-red-500 flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full bg-gradient-to-r from-red-500 to-white"></div> Red Ops
                            </button>
                            <button onclick="setTheme('fire')"
                                class="w-full text-left px-4 py-3 text-sm text-gray-300 hover:bg-white/10 hover:text-yellow-500 flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full bg-gradient-to-r from-yellow-400 to-orange-500"></div>
                                Inferno
                            </button>
                        </div>
                    </div>

                    <!-- Language Toggle -->
                    <button onclick="toggleLanguage()"
                        class="text-xs text-gray-500 hover:text-[#00f0ff] font-mono border border-gray-700 px-3 py-1.5 rounded transition flex items-center gap-2 uppercase">
                        <i class="fa-solid fa-globe"></i> <span id="lang-label">EN</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 relative z-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 bg-[#020617]/80 backdrop-blur-sm mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
            <p>&copy; 2026 PhishGuard Security. <span data-i18n="footer_rights">All systems operational.</span></p>
        </div>
    </footer>

    <script>
        // --- THEME SYSTEM ---
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme') || 'cyber';
        setTheme(savedTheme);

        // --- LANGUAGE SYSTEM ---
        const translations = {
            th: {
                // Nav
                nav_home: "หน้าแรก",
                nav_about: "เกี่ยวกับ Phishing",
                nav_news: "ข่าวสาร",
                nav_chat: "เจนิส AI",
                nav_contact: "ติดต่อเรา",
                nav_report: "แจ้งภัยคุกคาม",

                // Hero
                hero_title: "ตรวจจับ <span class='text-primary'>Phishing</span> ก่อนโดนหลอก",
                hero_subtitle: "ปกป้องข้อมูลสำคัญของคุณด้วยระบบวิเคราะห์ลิงก์ผ่าน AI และการตรวจสอบการพรางตัวแบบ Real-time",
                check_btn: "ตรวจสอบทันที",
                placeholder: "วาง URL ที่ต้องการตรวจสอบ (เช่น https://bit.ly/xxxx)",

                // Results (handled by JS mainly, but placeholders here)
                limit_safe: "ปลอดภัย",
                limit_danger: "อันตราย",

                // Tools Grid
                tools_ocr: "OCR ANALYSIS",
                tools_ocr_desc: "แปลงภาพเป็นข้อความ",
                tools_zero: "ZERO-DAY",
                tools_zero_desc: "สแกนหาภัยคุกคามใหม่",
                tools_contact: "CONTACT US",
                tools_contact_desc: "ทีมซัพพอร์ต",
                tools_check: "URL CHECK",
                tools_check_desc: "ฐานข้อมูล & AI",

                footer_rights: "ระบบปฏิบัติการสมบูรณ์",
                lang_label: "TH"
            },
            en: {
                // Nav
                nav_home: "Home",
                nav_about: "About Phishing",
                nav_news: "News",
                nav_chat: "Cyber AI",
                nav_contact: "Contact",
                nav_report: "Report Threat",

                // Hero
                hero_title: "Detect <span class='text-primary'>Phishing</span> Before It Strikes",
                hero_subtitle: "Protect your data with AI-powered link analysis and real-time VPN/Proxy detection.",
                check_btn: "Check Now",
                placeholder: "Paste URL to check (e.g. https://bit.ly/xxxx)",

                limit_safe: "Safe",
                limit_danger: "Danger",

                // Tools Grid
                tools_ocr: "OCR ANALYSIS",
                tools_ocr_desc: "Image to Text",
                tools_zero: "ZERO-DAY",
                tools_zero_desc: "Heuristic Scan",
                tools_contact: "CONTACT US",
                tools_contact_desc: "Support Team",
                tools_check: "URL CHECK",
                tools_check_desc: "Database & AI",

                footer_rights: "All systems operational.",
                lang_label: "EN"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'th';

        function toggleLanguage() {
            currentLang = currentLang === 'th' ? 'en' : 'th';
            localStorage.setItem('lang', currentLang);
            updateLanguageUI();
        }

        function updateLanguageUI() {
            // Update Label
            const langLabel = document.getElementById('lang-label');
            if (langLabel) langLabel.innerText = currentLang.toUpperCase();

            // Update Text Elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerHTML = translations[currentLang][key]; // innerHTML allows spans
                }
            });

            // Update Placeholders
            const input = document.getElementById('urlInput');
            if (input && translations[currentLang]['placeholder']) {
                input.placeholder = translations[currentLang]['placeholder'];
            }
        }

        // Init Language
        document.addEventListener('DOMContentLoaded', updateLanguageUI);
    </script>
</body>

</html>
