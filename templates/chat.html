{% extends "layout.html" %}
{% block title %}NEURAL LINK{% endblock %}
{% block content %}

<div class="cyber-card h-[80vh] flex flex-col p-4 relative">
    <div
        class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50">
    </div>

    <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-4">
        <h2 class="text-2xl text-neon"><i class="fa-solid fa-shield-halved"></i> CYBER_SCAN_AI_V2</h2>
        <div class="text-sm text-cyan-400 font-mono">PERSONA: SECURITY_EXPERT</div>
    </div>

    <!-- Chat Output -->
    <div id="chat-box"
        class="flex-1 overflow-y-auto space-y-4 pr-2 scrollbar-thin scrollbar-thumb-cyan-900 scrollbar-track-transparent">
        <div class="flex flex-col space-y-1">
            <span class="text-xs text-cyan-400 font-mono">SYSTEM:</span>
            <div
                class="bg-gray-800/50 p-4 rounded-r-lg rounded-bl-lg border-l-2 border-cyan-500 max-w-[85%] text-base text-gray-100">
                Ready to analyze messages and links. Please provide the content you wish to verify for security risks.
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="mt-4 flex gap-2">
        <input type="text" id="userInput" class="cyber-input mb-0 flex-1 text-base"
            placeholder="PASTE MESSAGE OR LINK HERE..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" class="cyber-btn px-6 text-lg">
            <i class="fa-solid fa-search"></i>
        </button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;

        // User Msg
        addMessage('USER', msg, 'right');
        userInput.value = '';

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `message=${encodeURIComponent(msg)}`
            });
            const data = await res.json();

            // AI Msg
            if (data.error) {
                addMessage('SYSTEM', data.error, 'left', true);
            } else {
                // First, show the natural text response if available
                if (data.response) {
                    // Extract the text part if it's wrapped in JSON by the AI (fallback)
                    let textContent = data.response;
                    try {
                        // Check if it's just a raw JSON string from AI (shouldn't happen with extract_json but safe)
                        const parsed = JSON.parse(textContent);
                        if (parsed.analysis_result) textContent = "Analysis Complete.";
                    } catch (e) { }

                    addMessage('SECURITY_EXPERT', textContent, 'left');
                }

                // If there's structured analysis, render it
                if (data.analysis_result) {
                    renderAIAnalysis(data.analysis_result);
                }
            }

        } catch (e) {
            addMessage('SYSTEM', 'CONNECTION ERROR: ' + e.message, 'left', true);
        }
    }

    function renderAIAnalysis(result) {
        const { is_scam, risk_score, category, detected_flags, recommendation } = result;

        // Determine Color & Icon
        let bgColor = "bg-gray-800/50";
        let borderColor = "border-cyan-500";
        let icon = "✅";
        let statusText = "SAFE";

        if (risk_score >= 80) {
            bgColor = "bg-red-900/20";
            borderColor = "border-red-500";
            icon = "🚨";
            statusText = "CRITICAL";
        } else if (risk_score >= 40) {
            bgColor = "bg-yellow-900/20";
            borderColor = "border-yellow-500";
            icon = "⚠️";
            statusText = "WARNING";
        }

        const div = document.createElement('div');
        div.className = `flex flex-col space-y-1 items-start`;

        let flagsHtml = "";
        if (detected_flags && detected_flags.length > 0) {
            flagsHtml = `
                <div class="mt-2 text-xs font-mono opacity-80">
                    <strong>DETECTED FLAGS:</strong>
                    <ul class="list-disc ml-4 mt-1">
                        ${detected_flags.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        div.innerHTML = `
            <span class="text-xs text-cyan-400 font-mono uppercase">SECURITY_EXPERT [${statusText}]</span>
            <div class="${bgColor} border-l-4 ${borderColor} p-4 rounded-r-lg rounded-bl-lg max-w-[90%] text-base text-gray-100 backdrop-blur-sm shadow-lg">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-2xl">${icon}</span>
                    <div>
                        <div class="font-bold text-lg">${category}</div>
                        <div class="text-sm opacity-70">Risk Score: ${risk_score}/100</div>
                    </div>
                </div>
                ${flagsHtml}
                <div class="mt-3 p-2 bg-black/30 rounded border border-white/10 italic text-sm">
                    <strong>Recommendation:</strong> ${recommendation}
                </div>
            </div>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addMessage(sender, text, align, isError = false) {
        const div = document.createElement('div');
        div.className = `flex flex-col space-y-1 ${align === 'right' ? 'items-end' : 'items-start'}`;

        const bubbleColor = align === 'right'
            ? 'bg-cyan-900/20 border-r-2 border-cyan-500 rounded-l-lg rounded-br-lg'
            : 'bg-gray-800/50 border-l-2 border-purple-500 rounded-r-lg rounded-bl-lg';

        const textColor = isError ? 'text-red-400' : 'text-gray-100';

        div.innerHTML = `
            <span class="text-xs text-cyan-400 font-mono uppercase">${sender}</span>
            <div class="${bubbleColor} p-4 max-w-[85%] text-base ${textColor} backdrop-blur-sm">
                ${text}
            </div>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
{% endblock %}
